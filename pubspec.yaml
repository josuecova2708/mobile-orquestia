name: orquestia_mobile
description: Orquestia BPM Studio — App móvil para funcionarios y administradores.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # HTTP client con interceptores
  dio: ^5.7.0

  # State management
  provider: ^6.1.2

  # Persistencia local (JWT token)
  shared_preferences: ^2.3.3

  # Navegación declarativa
  go_router: ^14.6.0

  # Tipografía Inter
  google_fonts: ^6.2.1

  # Formateo de fechas
  intl: ^0.19.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.0

  # Abrir web para "resolver en la web"
  url_launcher: ^6.3.1

  # Cámara / galería para subir documentos desde el celular
  image_picker: ^1.1.2

  # Selección de archivos (PDF, Word, etc.) respetando formatos permitidos
  file_picker: ^8.1.4

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
